version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: mymysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: yaoqi_db
      MYSQL_USER: yaoqi
      MYSQL_PASSWORD: 'Yaoqi123!'
    ports:
      - "3306:3306"
    volumes:
      - /var/lib/mysql:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: myredis
    restart: always
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"

  flask-app:
    build: .
    container_name: yaoqi-app
    restart: always
    network_mode: host
    depends_on:
      - mysql
      - redis
    volumes:
      - /home/yaoqi/scripts:/app/scripts

  nginx:
    image: nginx:latest
    container_name: mynginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app
